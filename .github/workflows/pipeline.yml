name: pipeline

on:
  # Manual-only for now (#16). To enable scheduled refreshes, uncomment:
  # schedule:
  #   - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      since_days:
        description: "Backfill window in days (empty = incremental from cursor)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: learnpulse-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SINCE_DAYS: ${{ inputs.since_days }}
        run: |
          if [ -n "$SINCE_DAYS" ]; then
            python pipeline/run.py --since-days "$SINCE_DAYS"
          else
            python pipeline/run.py
          fi

      # The repo ruleset requires all changes to main to go through a PR,
      # so the data refresh is published as an auto-merged PR rather than a
      # direct push.
      - name: Publish data updates via pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "learnpulse-bot"
          git config user.email "actions@github.com"
          git add data docs/data digests
          if git diff --quiet --cached; then
            echo "No data changes to publish."
            exit 0
          fi
          BRANCH="pipeline/refresh-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git commit -m "pipeline: refresh data feeds"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "pipeline: refresh data feeds" \
            --body "Automated data refresh from pipeline run ${{ github.run_id }}."
          gh pr merge "$BRANCH" --squash --delete-branch
