name: pipeline

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      since_days:
        description: "Backfill window in days (empty = incremental from cursor)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: learnpulse-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SINCE_DAYS: ${{ inputs.since_days }}
        run: |
          if [ -n "$SINCE_DAYS" ]; then
            python pipeline/run.py --since-days "$SINCE_DAYS"
          else
            python pipeline/run.py
          fi

      - name: Commit and push data updates
        run: |
          git config user.name "learnpulse-bot"
          git config user.email "actions@github.com"
          git add data docs/data digests
          git diff --quiet --cached || git commit -m "pipeline: refresh data feeds"
          git push
